services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fast_plan
      POSTGRES_USER: fast_plan
      POSTGRES_PASSWORD: fast_plan
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fast_plan -d fast_plan"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      POSTGRES_DB: fast_plan
      POSTGRES_USER: fast_plan
      POSTGRES_PASSWORD: fast_plan
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: change-me-in-production
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
